services:
  - type: web
    name: ecosync-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node -r @swc-node/register server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
